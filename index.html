        .result-card .character-name{font-size:28px;font-weight:700;color:#d4a574;letter-spacing:3px;margin-bottom:2px}

<script>
var Q=[{id:1,yr:"878年",ti:"黄巢的均平",sc:"取材：《旧唐书·黄巢传》《新唐书·逆臣传》",ct:'乾符五年（878年），黄巢率军转战各地，沿途发布檄文，宣称"天补均平"，要均贫富、等贵贱。百姓纷纷响应，从者如云。此时你作为一介布衣，家乡遭旱灾，田地荒芜，父母饿死，而本地豪强却囤积粮食、高价出售。黄巢的人马即将到来，宣称要"开仓赈济、杀尽豪强"，你会：',qt:"你会如何选择？",op:[{l:"A",t:'立即加入黄巢军！这样的世道，不反还有什么活路？宁可战死，也要讨个公道。',s:{Rebel:5,Mobilization:3,Morality:2,Survival:1}},{l:"B",t:'虽然同情黄巢，但认为杀人抢劫终归不对。选择逃往他处，远离战乱。',s:{Survival:4,Morality:1,Rebel:-2}},{l:"C",t:'向豪强告密，透露黄巢军的动向，以此换取一袋粮食。',s:{Kill:3,Pragmatism:2,Morality:-3}},{l:"D",t:'组织乡民自保，既不投奔黄巢，也不协助官军，只求保全乡里。',s:{Mobilization:4,Survival:3,Pragmatism:2,Rebel:-1}},{l:"E",t:'认为黄巢也不过是另一个军阀，等他得了天下，照样鱼肉百姓。选择隐忍等待。',s:{Pragmatism:3,Morality:1,Rebel:-1}}]},{id:2,yr:"881年",ti:"郑畋的勤王",sc:"取材：《旧唐书·郑畋传》《新唐书·郑畋传》",ct:'中和元年（881年），黄巢攻入长安，僖宗逃往成都。郑畋时任凤翔节度使，召集诸将盟誓勤王。诸将皆曰："贼势方盛，宜且观变。"郑畋怒道："吾位将相，世受国恩，见危不救，何以对天下？"随即歃血为盟，誓死效忠唐室。',qt:"你作为郑畋帐下小将，诸将皆观望，你会：",op:[{l:"A",t:'第一个响应郑畋，誓死追随。国难当头，正男儿建功立业之时。',s:{Authority:5,Military:3,Morality:3,Rebel:-2}},{l:"B",t:'虽然敬佩郑畋的忠义，但认为时机未到，建议先巩固凤翔，待诸镇响应后再出兵。',s:{Military:3,Pragmatism:3,Authority:1}},{l:"C",t:'认为唐室气数已尽，劝郑畋拥兵自重，静观其变。',s:{Rebel:4,Pragmatism:3,Authority:-3}},{l:"D",t:'暗中派人联络黄巢，表示愿意投降，以换取富贵。',s:{Kill:3,Rebel:3,Morality:-4,Survival:2}},{l:"E",t:'建议郑畋上表僖宗，请立太子监国，以安天下人心，同时联络各藩镇共讨黄巢。',s:{Politics:4,Mobilization:3,Rule:2}}]},{id:3,yr:"884年",ti:"黄巢的末日",sc:"取材：《旧唐书·黄巢传》《新唐书·逆臣传》",ct:'中和四年（884年），黄巢败亡于泰山狼虎谷。其外甥林言见大势已去，劝黄巢自刎，表示愿意取其首级向唐军请降，换得一线生机。黄巢怒斥："汝欲卖我以求富贵耶？"拔刀欲斩林言。',qt:"此时你作为黄巢帐下最后的亲兵，目睹这一幕，你会：",op:[{l:"A",t:'趁黄巢不备，从背后刺杀他，然后取首级投降。识时务者为俊杰，跟着他只有死路一条。',s:{Kill:4,Survival:4,Morality:-4,Rebel:-3}},{l:"B",t:'护在黄巢身前，与林言对峙。即使今日必死，也要死得像个义军战士。',s:{Morality:3,Survival:-4,Military:2,Authority:2}},{l:"C",t:'跪地痛哭，劝黄巢自刎以全名节，自己愿随他而去。与其被乱刀分尸，不如死得壮烈。',s:{Morality:4,Survival:-3,Rebel:2,Kill:2}},{l:"D",t:'趁乱逃走，既不背叛黄巢，也不陪他送死。乱世之中，活着比什么都重要。',s:{Survival:5,Morality:-1,Rebel:1}},{l:"E",t:'提议护送黄巢突围，哪怕只有一线生机。只要主公在，义军就还有希望。',s:{Military:3,Survival:2,Morality:2,Pragmatism:-2}}]},{id:4,yr:"乾宁年间",ti:"义儿军的试炼",sc:"取材：《旧五代史·唐书·武皇纪》《新五代史·义儿传》",ct:'乾宁年间，李克用被困于邢州，粮草断绝。大将李存信建议："军中粮尽，请以羸弱之卒为食，保存精锐。"李克用犹豫未决。此时你作为帐中小校，负责看管俘虏的敌军斥候十人。大营已三日无粮，士兵们饿得眼神发绿，有人开始偷吃战马。李克用传令："尔等自行处置俘虏，以解燃眉之急。"',qt:"面对这十名俘虏，你会：",op:[{l:"A",t:'毫不犹豫，亲自操刀，将俘虏尽数斩杀分食。乱世之中，活下来才有道理，妇人之仁只会害死全军。',s:{Kill:5,Survival:4,Morality:-4,Military:2}},{l:"B",t:'只杀半数，留半数作为后备粮。同时向李克用建议，此事不可外传，需统一口径称俘虏"病亡"。',s:{Politics:3,Pragmatism:3,Kill:3,Morality:-2}},{l:"C",t:'以"降者不杀"为由，只杀其中两人儆众，其余放走。虽违军令，但天道好还，今日杀俘，他日必遭报应。',s:{Morality:3,Rule:2,Rebel:2,Military:-2}},{l:"D",t:'偷偷放走所有俘虏，谎称他们趁夜逃脱。宁愿自己挨饿，也不能做出禽兽之事。',s:{Morality:5,Survival:-3,Rebel:3,Kill:-3}},{l:"E",t:'向李克用进言：杀俘虽可解一时之急，但会寒了天下豪杰之心。不如遣使向周边州县借粮，承诺破敌后加倍奉还。',s:{Politics:4,Mobilization:2,Pragmatism:2,Morality:2}}]},{id:5,yr:"893年",ti:"杨行密的粮荒",sc:"取材：《旧五代史·梁书·杨行密传》《十国春秋·吴一》",ct:'景福二年（893年），杨行密据扬州，但连年战乱，城内粮尽，米价飞涨，百姓易子而食。杨行密欲开仓赈济，但仓中存粮仅够军需。有谋士建议："可抄没城中富户，以其粮赈济百姓。"杨行密犹豫，担心此举会吓跑城中富商。',qt:"你作为扬州百姓，家中已无隔夜之粮，你会：",op:[{l:"A",t:'组织饥民冲击富户粮仓，"不抢就要饿死，还管什么王法？"',s:{Rebel:4,Mobilization:3,Survival:3,Rule:-3}},{l:"B",t:'向杨行密请愿，哭诉百姓之苦，请求他先赈济百姓，军粮可再想办法。',s:{Mobilization:3,Morality:2,Pragmatism:-1}},{l:"C",t:'认为抄没富户是饮鸩止渴，建议杨行密向周边州县借粮，承诺来年加倍奉还。',s:{Politics:3,Pragmatism:3,Rule:2}},{l:"D",t:'为了生存，将自己卖为奴婢，换取一口饭吃。',s:{Survival:4,Pragmatism:2,Rebel:-2}},{l:"E",t:'暗中联络富户，表示愿意做内应保护他们的财产，以此换取粮食。',s:{Politics:3,Survival:2,Morality:-2}}]},{id:6,yr:"904年",ti:"钱镠的筑城",sc:"取材：《旧五代史·梁书·钱镠传》《十国春秋·吴越一》",ct:'天祐元年（904年），钱镠欲扩建杭州城，需要征发民夫十万。但此时正值农忙时节，若征发民夫，则田地荒芜；若不筑城，则无法抵御杨行密的进攻。钱镠召集百姓商议，有老者哭诉："农时不可误，否则全年无收。"但也有青年主战："不筑城，敌来则人死城破，要田何用？"',qt:"你作为杭州百姓，家中有五亩薄田，你会：",op:[{l:"A",t:'主动报名筑城。"国若不在，家何存焉？"',s:{Mobilization:5,Military:2,Morality:2,Survival:1}},{l:"B",t:'建议钱镠只征发无地游民筑城，有田者继续耕种，两不耽误。',s:{Politics:3,Pragmatism:3,Mobilization:1}},{l:"C",t:'偷偷逃亡他乡，既不当兵也不筑城，保全自家田地。',s:{Survival:4,Rebel:2,Mobilization:-3}},{l:"D",t:'组织乡民向钱镠请愿，要求延后筑城至秋收之后。',s:{Mobilization:3,Rule:2,Pragmatism:1}},{l:"E",t:'建议钱镠以工代赈，给筑城民夫发放钱粮，这样既筑了城，百姓也不吃亏。',s:{Politics:4,Mobilization:3,Pragmatism:2}}]},{id:7,yr:"905年",ti:"白马驿之祸",sc:"取材：《旧五代史·梁书·太祖纪》《新五代史·李振传》",ct:'天祐二年（905年），朱温已控制唐廷。宰相柳璨迎合朱温心意，诬告大臣裴枢、独孤损等三十余人为"朋党"，请朱温诛杀。朱温谋士李振进言："此辈自谓清流，宜投之黄河，使为浊流！"朱温大笑而从之，一夜杀尽朝中清流。',qt:"此时你作为朱温帐下谋士，面对这场屠杀，你会：",op:[{l:"A",t:'进言"投之黄河"的正是你，这些清流平日自命不凡，阻碍新朝建立，该杀！且以羞辱方式处决，可立威于天下。',s:{Kill:5,Rebel:2,Morality:-3,Pragmatism:3}},{l:"B",t:'虽不赞同如此残酷，但朱温意已决，此时进谏恐祸及自身，选择沉默旁观，明哲保身。',s:{Survival:4,Authority:2,Morality:-1}},{l:"C",t:'冒险进言，劝朱温只诛首恶、赦免从犯，既可收天下人心，亦显主公仁德。',s:{Morality:3,Politics:2,Survival:-2}},{l:"D",t:'借故离营，不愿亲眼见到这幕惨剧，内心已萌去意，开始考虑投奔他处。',s:{Morality:2,Rebel:2,Survival:1,Authority:-3}},{l:"E",t:'暗中通知裴枢等人逃走，宁可背负背叛之名，也不能见死不救。',s:{Morality:4,Rebel:3,Survival:-4,Pragmatism:-2}}]},{id:8,yr:"908年",ti:"李克用的临终嘱托",sc:"取材：《旧五代史·唐书·庄宗纪》《新五代史·唐本纪》",ct:'天祐五年（908年），李克用病危，召李存勖至床前，以箭授之，泣曰："梁，吾仇也；燕王，吾所立，契丹，与吾约为兄弟，而皆背晋以归梁。此三者，吾遗恨也。与尔三矢，尔其无忘乃父之志！"李存勖跪受。',qt:"此时你作为李存勖的伴读，亲眼见证这一幕，你对这三支箭的看法是：",op:[{l:"A",t:'这是先王的遗命，必须遵从！哪怕耗尽毕生之力，也要完成这三件大事。',s:{Authority:5,Military:3,Morality:2,Rebel:-3}},{l:"B",t:'先王遗命固然重要，但时移世易，不可拘泥。若有机会则应为之，若无机会则不必强求。',s:{Pragmatism:4,Authority:1,Rule:-1}},{l:"C",t:'建议李存勖表面遵从，暗中积蓄实力，待时机成熟再图谋。不可因复仇而耗尽国力。',s:{Politics:4,Pragmatism:3,Military:1}},{l:"D",t:'认为李克用把个人恩怨强加于儿子身上，实非明父所为。李存勖应当有自己的志向。',s:{Rebel:4,Authority:-3,Morality:1}},{l:"E",t:'建议李存勖将三支箭供于宗庙，作为激励将士的象征，但不必真的被其束缚。',s:{Mobilization:3,Pragmatism:2,Authority:1}}]},{id:9,yr:"911年",ti:"柏乡之战的赌局",sc:"取材：《旧五代史·唐书·庄宗纪》《新五代史·唐臣传》",ct:'开平五年（911年），后梁太祖朱温遣大将王景仁率八万精兵攻赵，晋王李存勖决定亲率大军驰援。行至柏乡，晋军仅三万，梁军八万且装备精良。周德威劝谏："梁军精锐，不可轻战，宜退守高邑，以逸待劳。"李存勖年轻气盛，欲立即决战。',qt:"你作为晋军裨将，被问及意见。此时探马来报：梁军正渡水，阵型未整。你会建议：",op:[{l:"A",t:'力主立即出击！趁敌半渡而击之，此乃天赐良机。兵贵神速，犹豫不决只会错失战机。',s:{Military:5,Pragmatism:2,Survival:-2}},{l:"B",t:'赞同周德威，建议退守高邑，深沟高垒，待梁军粮尽自退。以三万对八万，强攻无异于自杀。',s:{Military:2,Survival:3,Pragmatism:3}},{l:"C",t:'建议派小股骑兵骚扰，迟滞梁军渡河，同时派使者联络成德、义武节度使，约定夹击。',s:{Politics:4,Military:3,Mobilization:2}},{l:"D",t:'建议夜袭梁军粮草大营，断其补给，逼其撤退。不战而屈人之兵，方为上策。',s:{Military:4,Politics:3,Pragmatism:2}},{l:"E",t:'建议李存勖诈败诱敌，将梁军引入预设伏击圈。此计虽险，但若成则可全歼敌军。',s:{Military:4,Politics:3,Kill:2,Survival:-1}}]},{id:10,yr:"912年",ti:"朱友珪的弑父",sc:"取材：《旧五代史·梁书·末帝纪》《新五代史·梁家人传》",ct:'乾化二年（912年），朱温病重，欲传位给养子朱友文，亲子朱友珪闻讯，率禁军闯入宫中。朱温惊起，喝道："逆子！汝欲弑父耶？"朱友珪使冯廷谔刺死朱温，秘不发丧，矫诏赐死朱友文，自立为帝。',qt:"你作为朱温帐下谋士，事发当晚被软禁于府中，听闻此事后，你会：",op:[{l:"A",t:'立即起草贺表，称朱友珪"奉天承运"，率先表示拥戴。识时务者为俊杰，此时反抗无异于以卵击石。',s:{Pragmatism:5,Politics:4,Morality:-3,Authority:-3}},{l:"B",t:'闭门不出，称病不朝，观望风向。待局势明朗后再做抉择。',s:{Survival:4,Pragmatism:3,Politics:2}},{l:"C",t:'暗中联络朱友贞（朱温另一子），建议他起兵讨逆，为父报仇。若成，则从龙之功；若败，则死不认账。',s:{Politics:5,Rebel:4,Morality:2,Survival:-2}},{l:"D",t:'公开上表谴责朱友珪弑父之罪，号召天下共讨之。即使身死，也要保全名节。',s:{Morality:5,Rebel:3,Survival:-4,Kill:-3}},{l:"E",t:'向朱友珪进言，建议他立即处死所有兄弟和功臣，以绝后患。斩草要除根。',s:{Kill:4,Politics:3,Pragmatism:2,Morality:-3}}]},{id:11,yr:"917年",ti:"幽州之围",sc:"取材：《旧五代史·唐书·庄宗纪》《辽史·太祖纪》",ct:'天祐十四年（917年），契丹耶律阿保机率三十万大军攻幽州，晋将周德威告急，一日之内连发七道求援信，此时李存勖正与梁军对峙于黄河，若分兵救幽州，则正面防线空虚；若不救，则幽州必失，且周德威危矣。李存勖帐下众将多主张固守。',qt:"你作为李存勖的亲信谋士，他会私下问计于你，你会：",op:[{l:"A",t:'力主分兵救援！幽州乃北方重镇，若失则门户洞开。且周德威乃国之柱石，不可不救。',s:{Military:3,Morality:3,Pragmatism:-2}},{l:"B",t:'建议弃幽州，集中兵力先灭后梁。契丹虽得幽州，一时难以下中原，待灭梁后再图收复。',s:{Pragmatism:5,Military:2,Morality:-3}},{l:"C",t:'建议联合吴越、闽、楚等国，请他们从南方牵制后梁，然后晋军全力北上击退契丹。',s:{Politics:5,Mobilization:3,Military:2}},{l:"D",t:'建议固守不战，待契丹粮草耗尽自退。草原民族不善攻城，久战必疲。',s:{Military:2,Survival:3,Pragmatism:2}},{l:"E",t:'建议李存勖亲自率轻骑驰援，以示必救之心，激励士气。主公亲至，将士必效死力。',s:{Mobilization:4,Military:3,Survival:-3,Authority:2}}]},{id:12,yr:"918年",ti:"魏州之战的心理战",sc:"取材：《旧五代史·唐书·庄宗纪》《新五代史·唐臣传》",ct:'天祐十五年（918年），李存勖欲趁梁军内乱之机，直取大梁。李存勖亲率大军与梁将贺瑰对峙于魏州。贺瑰善守，深沟高垒，拒不出战。晋军粮草渐尽，士气低落。有谋士建议："可散布谣言，称梁帝朱友珪已杀朱友文，汴京大乱，贺瑰若回师则必败。"',qt:"你作为李存勖的亲信，认为此计如何：",op:[{l:"A",t:'此计大妙！兵法云"上兵伐谋"，不战而屈人之兵，方为上策。立即遣细作潜入敌营散布消息。',s:{Politics:4,Military:3,Pragmatism:2}},{l:"B",t:'建议李存勖亲自挑战贺瑰单挑，以晋王威名震慑敌军。主公武勇天下无敌，贺瑰必不敢应战，届时我军士气必振。',s:{Military:3,Authority:2,Kill:2}},{l:"C",t:'建议撤军回晋阳，待来年粮足再战。此时强攻，胜则惨胜，败则全军覆没，得不偿失。',s:{Survival:4,Pragmatism:3,Military:-2}},{l:"D",t:'提议趁夜劫营，焚烧梁军粮草。只要能毁掉贺瑰的补给，他必被迫出战或撤退。',s:{Military:4,Kill:2,Rebel:1}},{l:"E",t:'建议李存勖写一封《讨梁檄文》，历数朱温弑君之罪，传檄天下，号召各路藩镇共讨之。',s:{Mobilization:4,Politics:3,Literature:3,Rule:2}}]},{id:13,yr:"923年",ti:"王景仁的投降",sc:"取材：《旧五代史·梁书·王景仁传》《新五代史·梁臣传》",ct:'龙德三年（923年），李存勖奇袭大梁，梁末帝朱友贞自杀，后梁灭亡。梁将王景仁率残部投降，诸将皆请杀之以绝后患。王景仁乃朱温旧将，曾大败晋军，与晋人血海深仇。但李存勖深知王景仁乃当世名将，杀之则寒天下豪杰之心。',qt:"你作为晋军将领，曾在王景仁手下吃过败仗，旧友多死于此人之手，面对这个仇人，你会：",op:[{l:"A",t:'力主斩杀王景仁！此等仇敌，不杀不足以告慰阵亡将士在天之灵。',s:{Kill:5,Morality:2,Pragmatism:-2}},{l:"B",t:'建议接纳投降，但要王景仁亲手处决几名梁室忠臣作为投名状。他若肯做，则真心归降；若不肯，则杀之。',s:{Politics:4,Kill:3,Pragmatism:3,Morality:-2}},{l:"C",t:'建议李存勖以国士之礼待王景仁，不计前嫌。如此可昭告天下：晋王胸怀如海，归降者皆得重用。',s:{Mobilization:5,Morality:3,Politics:3,Kill:-2}},{l:"D",t:'表面赞同接纳，私下派人刺杀王景仁，嫁祸于梁军残党。既除了后患，又不损主公名声。',s:{Politics:5,Kill:3,Morality:-3,Pragmatism:2}},{l:"E",t:'建议将王景仁软禁于晋阳，不杀也不用，待天下平定后再做处置。稳妥为上。',s:{Survival:3,Pragmatism:3,Politics:2}}]},{id:14,yr:"923年",ti:"张承业的忠义",sc:"取材：《旧五代史·唐书·张承业传》《新五代史·宦者传》",ct:'同光元年（923年），李存勖欲称帝，遣使告知张承业。张承业痛哭曰："吾王老奴，受先王遗命，誓复唐室。今大王自帝，是负先王也。老奴请死，不忍见大王之失德。"李存勖不听，张承业绝食而死。',qt:"你作为晋军将领，曾受张承业提携之恩，面对他的死谏，你会：",op:[{l:"A",t:'为张承业之死痛哭，并以此为由辞官归隐。不愿为不忠不义之君效力。',s:{Morality:5,Authority:3,Rebel:2,Survival:-3}},{l:"B",t:'虽然敬佩张承业，但认为时势已变，复唐已不可能。继续追随李存勖。',s:{Pragmatism:4,Authority:1,Morality:-1}},{l:"C",t:'向李存勖进言，建议以张承业之礼安葬，并追赠高官，以安抚人心。',s:{Politics:4,Pragmatism:3,Mobilization:2}},{l:"D",t:'认为张承业太过迂腐。唐已亡多年，执着于复唐毫无意义。',s:{Rebel:2,Pragmatism:2,Morality:-2}},{l:"E",t:'暗中联络仍忠于唐室的将领，准备在李存勖称帝时起兵反对。',s:{Rebel:5,Morality:3,Politics:2,Survival:-4}}]},{id:15,yr:"923年",ti:"王彦章的决斗",sc:"取材：《旧五代史·梁书·王彦章传》《新五代史·死节传》",ct:'龙德三年（923年），后梁已亡，王彦章被晋军俘虏。李存勖爱其勇，亲自劝降："卿常称我为小儿，今日服乎？"王彦章答道："大事已去，非人力可为。彦章武人，不知降字。"李存勖又道："卿若降，当授以节度使。"王彦章仍不从。',qt:"你作为李存勖的侍卫，见证了这一幕，你会：",op:[{l:"A",t:'敬佩王彦章的忠义，向李存勖进言："如此忠臣，杀之不祥，不如放归乡里。"',s:{Morality:4,Military:2,Kill:-2}},{l:"B",t:'认为王彦章不识时务，劝李存勖杀之以绝后患。',s:{Kill:3,Pragmatism:2,Morality:-2}},{l:"C",t:'建议李存勖继续劝降，以荣华富贵诱之，同时扣押其家眷为质。',s:{Politics:4,Pragmatism:2,Morality:-2}},{l:"D",t:'内心被王彦章的气节感动，若有一日自己也处于同样境地，希望也能如此从容赴死。',s:{Morality:3,Authority:3,Military:1}},{l:"E",t:'认为王彦章愚忠。梁朝已亡，为谁而死？活着才能做更多事。',s:{Pragmatism:3,Survival:2,Morality:-1}}]},{id:16,yr:"936年",ti:"石敬瑭的抉择",sc:"取材：《旧五代史·晋书·高祖纪》《新五代史·晋本纪》",ct:'清泰三年（936年），后唐末帝李从珂猜忌石敬瑭，石敬瑭被困于太原，遣使向契丹求救。耶律德光提出条件：割幽云十六州，称臣称子。石敬瑭部下刘知远反对："称臣可矣，以父事之太过；多输金帛可矣，割地太过。"但石敬瑭深知，不答应则必死无疑。',qt:"你作为石敬瑭的心腹，面对这个千古骂名的抉择，你会建议：",op:[{l:"A",t:'劝石敬瑭接受一切条件！幽云十六州虽重要，但不及性命重要。活下来才有翻盘的机会。',s:{Survival:5,Pragmatism:5,Morality:-4,Military:-2}},{l:"B",t:'建议只割部分州郡，以金帛代之。尽量减轻千古骂名，为将来收复留有余地。',s:{Politics:4,Pragmatism:3,Morality:-1}},{l:"C",t:'建议宁死不降！宁可战死太原，也不能做千古罪人，遗臭万年。',s:{Morality:5,Rebel:3,Survival:-5,Kill:2}},{l:"D",t:'建议假意投降，待站稳脚跟后再图谋。先借契丹之力灭后唐，再徐徐图之。',s:{Politics:5,Pragmatism:4,Rebel:2,Morality:-2}},{l:"E",t:'建议石敬瑭向李从珂请罪，主动交出兵权，以全家老小的性命换取一线生机。',s:{Authority:4,Morality:2,Survival:2,Rebel:-3}}]},{id:17,yr:"950年",ti:"郭威的黄袍加身",sc:"取材：《旧五代史·周书·太祖纪》《新五代史·周本纪》",ct:'乾祐三年（950年），后汉隐帝刘承祐诛杀郭威全家，郭威起兵复仇。大军渡过黄河，将士们突然扯下黄旗披在郭威身上，高呼"万岁"，拥立郭威为帝。郭威再三推辞，最后"不得已"接受。',qt:"你作为郭威的亲信，深知这一切皆有预谋，但在众人高呼之时，你会：",op:[{l:"A",t:'第一个跪下高呼万岁，声泪俱下："天命所归，主公不可违逆！"将此戏演到底。',s:{Politics:5,Mobilization:3,Pragmatism:2,Rule:-2}},{l:"B",t:'建议郭威暂时接受，但请辞帝号，待平定叛乱后再还政于刘氏。如此可全忠义之名。',s:{Morality:3,Politics:2,Pragmatism:1,Rule:2}},{l:"C",t:'暗中提醒郭威：此事必须做得像真的兵变，不可露出破绽，让众人多劝几次再"勉强"答应。',s:{Politics:4,Pragmatism:3,Morality:-1}},{l:"D",t:'保持沉默，冷眼旁观。这种戏码骗得了百姓，骗不了明眼人。',s:{Rebel:2,Authority:-2,Pragmatism:1}},{l:"E",t:'建议郭威立即处决几名"带头闹事"的将领，以示忠心，然后向朝廷请罪。',s:{Kill:3,Authority:3,Morality:2,Politics:-2}}]},{id:18,yr:"959年",ti:"柴荣与赵匡胤",sc:"取材：《旧五代史·周书·世宗纪》《宋史·太祖纪》",ct:'显德六年（959年），柴荣北征契丹，途中得到一块木牌，上书"点检做天子"。柴荣回师后，立即罢免了时任殿前都点检的张永德，改任赵匡胤为殿前都点检。有人说这是柴荣对赵匡胤的信任，有人说是试探。不久后柴荣病逝，临终托孤于赵匡胤等人。',qt:"你作为旁观者，感受到柴荣与赵匡胤之间：",op:[{l:"A",t:'是一种复杂的君臣关系。柴荣既要用赵匡胤，又不得不防他。',s:{Politics:4,Chemistry:3,Authority:2}},{l:"B",t:'是一种悲剧性的信任。柴荣临终托孤，却不知正是这个人夺了他儿子的天下。',s:{Chemistry:4,Morality:2,Literature:2}},{l:"C",t:'认为柴荣太过自信，以为自己的知遇之恩能换来赵匡胤的忠心。',s:{Pragmatism:3,Authority:-1,Chemistry:-1}},{l:"D",t:'被这种"知遇之恩"与"背叛"的戏剧张力吸引，这是乱世最动人的故事。',s:{Chemistry:5,Literature:3,Rebel:1}},{l:"E",t:'认为赵匡胤辜负了柴荣的信任，这种人应该被钉在历史的耻辱柱上。',s:{Morality:4,Authority:3,Chemistry:-2}}]},{id:19,yr:"961年",ti:"杯酒释兵权",sc:"取材：《续资治通鉴长编》《宋史·石守信传》",ct:'建隆二年（961年），赵匡胤设宴款待石守信等禁军大将。酒至半酣，赵匡胤叹道："朕非尔等不及此位，然天子亦大艰难，终夕未尝敢安枕而卧。"石守信等忙问其故，赵匡胤道："卿等虽无异心，然麾下将士欲富贵者，一旦以黄袍加汝身，汝虽欲不为，其可得乎？"',qt:"你作为在场将领，听懂弦外之音后，你会：",op:[{l:"A",t:'立即跪地，主动请辞军职，请求外放为节度使。识趣者方能善终。',s:{Pragmatism:5,Politics:4,Survival:3,Authority:2}},{l:"B",t:'装糊涂，继续饮酒作乐，顾左右而言他。拖一日是一日。',s:{Survival:3,Pragmatism:2,Politics:-1}},{l:"C",t:'直言进谏："臣等忠心耿耿，绝无二心，陛下何出此言？"以情动人。',s:{Authority:3,Morality:2,Politics:-2,Rebel:1}},{l:"D",t:'暗示赵匡胤：若陛下信不过臣等，臣等愿以子为质。以此换取信任。',s:{Politics:3,Pragmatism:2,Morality:-1}},{l:"E",t:'暗中联络其他将领，商议起兵清君侧。与其坐以待毙，不如拼死一搏。',s:{Rebel:5,Kill:3,Politics:2,Survival:-3}}]},{id:20,yr:"976年",ti:"赵光义的继位",sc:"取材：《续资治通鉴长编》《宋史·太宗纪》",ct:'开宝九年（976年），宋太祖赵匡胤驾崩，其弟赵光义继位，是为宋太宗。朝野议论纷纷，有"烛影斧声"之疑。赵光义即位后，立即改元，打破"逾年改元"的古制，引发更多猜测。',qt:"你作为朝中大臣，深知其中疑点重重，但在新帝登基大典上，面对赵光义投来的审视目光，你会：",op:[{l:"A",t:'表现得最为热情，带头山呼万岁，比任何人都显得更忠诚。只有如此才能消除嫌疑。',s:{Pragmatism:4,Politics:3,Survival:2,Morality:-2}},{l:"B",t:'保持中立，既不表现得过于热情，也不显得冷淡。静观其变。',s:{Survival:3,Pragmatism:2,Politics:1}},{l:"C",t:'暗中联络赵匡胤之子赵德昭，表示愿意支持他夺回应有的皇位。',s:{Rebel:4,Morality:2,Politics:2,Survival:-4}},{l:"D",t:'上书请求追查太祖驾崩真相，以安天下人心。即使因此获罪，也要做个忠臣。',s:{Morality:4,Rule:3,Rebel:2,Survival:-3}},{l:"E",t:'向赵光义献策，建议厚赏太祖旧臣，追封太祖诸子，以安抚人心，平息议论。',s:{Politics:4,Pragmatism:3,Mobilization:2}}]},{id:21,yr:"大顺年间",ti:"王建的抉择",sc:"取材：《旧五代史·前蜀书·王建传》《新五代史·前蜀世家》",ct:'大顺年间，王建随宦官田令孜入蜀。田令孜为巩固权势，命王建诛杀西川节度使陈敬瑗。王建兵临城下，陈敬瑗遣使求和："愿以全蜀相让，只求保全身家。"田令孜密令王建："斩草除根，勿留后患。"但王建深知陈敬瑗当年曾有恩于己。',qt:"此时你作为王建心腹，他私下征询你的意见，你会建议：",op:[{l:"A",t:'劝王建遵命行事，杀了陈敬瑗。一来可讨好田令孜，二来可独占西川。恩义在霸业面前不值一提。',s:{Kill:3,Pragmatism:4,Morality:-3,Politics:2}},{l:"B",t:'建议接受投降，软禁陈敬瑗而不杀。既全了旧恩，又可收蜀中人心，长远来看更有利。',s:{Politics:4,Morality:2,Mobilization:2,Pragmatism:2}},{l:"C",t:'建议王建表面答应，暗中联络陈敬瑗，共图田令孜。与其做田令孜的刀，不如自己做主。',s:{Rebel:4,Politics:4,Authority:-3,Pragmatism:2}},{l:"D",t:'建议放陈敬瑗一条生路，但逼他散尽家财充军，然后隐姓埋名远走。这样既交了差，又全了恩义。',s:{Morality:3,Pragmatism:3,Kill:-2}},{l:"E",t:'劝王建借机除掉田令孜，然后以"为陈敬瑗报仇"为名收编其旧部，一石二鸟。',s:{Politics:5,Kill:3,Rebel:3,Authority:-4}}]},{id:22,yr:"893年",ti:"杨行密的仁慈试炼",sc:"取材：《旧五代史·梁书·杨行密传》《十国春秋·吴一》",ct:'景福二年（893年），杨行密攻下扬州。降将孙儒旧部毕师铎仍据守一处粮仓，拒不投降。杨行密部下请令屠城，"以儆效尤"。杨行密却道："扬州经秦彦、毕师铎、孙儒之乱，百姓存者无几，何必再加杀戮？"',qt:'你作为杨行密亲兵，奉命进城劝降毕师铎，发现城中实已断粮，百姓易子而食。毕师铎哀求："愿降，但求活命。"你会：',op:[{l:"A",t:'假意接受投降，待其开城后尽数屠戮。这种反复无常之徒，留着也是祸害。',s:{Kill:4,Pragmatism:2,Morality:-3}},{l:"B",t:'如实回报杨行密，建议接纳投降，开仓赈济百姓。乱世之中，得民心者得天下。',s:{Mobilization:4,Morality:3,Politics:2}},{l:"C",t:'趁夜潜入，刺杀毕师铎，献其首级于杨行密。既不必屠城，又除后患，一举两得。',s:{Kill:3,Politics:3,Military:2,Morality:-1}},{l:"D",t:'放走毕师铎，谎称他趁乱突围。乱世求生不易，何必赶尽杀绝？',s:{Morality:3,Rebel:3,Survival:1,Authority:-3}},{l:"E",t:'逼迫毕师铎亲手处决其亲信，以此纳投名状。若他照办，则留用；若不肯，则杀之。',s:{Politics:4,Kill:2,Pragmatism:3,Morality:-2}}]},{id:23,yr:"926年",ti:"契丹的骑兵",sc:"取材：《旧五代史·唐书·明宗纪》《辽史·太宗纪》",ct:'天成元年（926年），契丹耶律阿保机去世，其子耶律德光继位，遣使向李嗣源请求互市。契丹缺铁、缺盐、缺茶叶，急需与中原贸易；而中原缺马，契丹骑兵的马匹正是中原急需之物。但群臣多反对，恐契丹借互市窥探中原虚实，且马匹流入契丹会增强其军力。',qt:"你作为李嗣源的谋士，对此事的看法是：",op:[{l:"A",t:'同意互市，但只出口盐茶，禁止出口铁器，同时要求契丹以战马交换。各取所需，于我有利。',s:{Pragmatism:4,Military:2,Politics:2}},{l:"B",t:'坚决反对！契丹乃蛮夷之邦，不可信任。与其互市，不如整军备战，待其内乱时一举击破。',s:{Military:3,Morality:2,Pragmatism:-2}},{l:"C",t:'建议派商人为细作，借互市之机打探契丹虚实，收买契丹贵族，为将来吞并做准备。',s:{Politics:5,Pragmatism:3,Rebel:2}},{l:"D",t:'建议趁契丹新丧，发兵攻打。此时契丹人心不稳，正是天赐良机。',s:{Military:4,Kill:3,Pragmatism:-1}},{l:"E",t:'建议以互市为筹码，要求契丹归还幽云十六州的汉人百姓。人命关天，贸易次之。',s:{Morality:4,Mobilization:2,Military:-2}}]},{id:24,yr:"文艺感知",ti:"罗隐的讽刺",sc:"取材：《全唐诗·罗隐集》",ct:'罗隐屡试不第，路过钟陵，见到当年曾仰慕自己的歌妓云英，云英已年老色衰，但仍未脱籍。罗隐写诗相赠："钟陵醉别十余春，重见云英掌上身。我未成名君未嫁，可能俱是不如人。"表面自嘲，实则讽刺世道不公。',qt:"你读到这首诗，感受到：",op:[{l:"A",t:'被罗隐的才华折服。这种"正话反说"的讽刺，比直接骂更有力量。',s:{Literature:5,Rebel:2,Pragmatism:1}},{l:"B",t:'更同情云英的遭遇。一个女子的青春就这样被时代消耗，诗人的自嘲何其自私。',s:{Morality:3,Literature:2,Mobilization:1}},{l:"C",t:'认为科举不公，罗隐有才无门，值得同情。这才是诗的真意。',s:{Rebel:3,Rule:-2,Literature:2}},{l:"D",t:'没什么特别感觉。乱世之中，谁不是在挣扎求生？',s:{Pragmatism:2,Survival:1}},{l:"E",t:'被诗中的"同是天涯沦落人"之感打动，想与罗隐痛饮一杯。',s:{Literature:3,Chemistry:2}}]},{id:25,yr:"文艺感知",ti:"李煜的词",sc:"取材：据《南唐二主词》校注，此词创作背景及李煜死因有争议，此处采用笔记小说说法",ct:'南唐后主李煜亡国后被囚于汴京。一夕登上小楼，凭栏远眺，见东风吹拂，春花秋月依旧，而故国早已不堪回首。词人挥笔写下一首《虞美人》："春花秋月何时了，往事知多少。小楼昨夜又东风，故国不堪回首月明中。"据说宋太宗读到这首词后，认为李煜"心思故国，不可久留"，遂赐牵机药将其毒死。',qt:"你读到这首词，感受到：",op:[{l:"A",t:'为李煜之死惋惜。一个词人，只因为写了几句词就被杀，这世道还有公道吗？',s:{Morality:4,Literature:3,Rebel:2}},{l:"B",t:'认为李煜不识时务。既已为囚，就应该低调保命，写这种词不是找死吗？',s:{Pragmatism:4,Authority:2,Literature:-1}},{l:"C",t:'被词中"故国不堪回首"之情感动，默默抄写传唱，纪念这位不幸的词人。',s:{Literature:5,Rebel:2,Morality:2}},{l:"D",t:'认为即使李煜真的因词获罪，也死得其所。一首好词，胜过无数苟且偷生。',s:{Literature:3,Morality:3,Authority:-1}},{l:"E",t:'从中悟出：权力才是最终的话语权。没有权力，连写词、写诗的自由都没有。',s:{Politics:3,Pragmatism:3,Literature:1}}]},{id:26,yr:"权威服从",ti:"冯道的抉择",sc:"取材：《旧五代史·周书·冯道传》《新五代史·冯道传》",ct:'冯道历仕四朝十君，从唐末到后周，始终位居宰相。有人问他："公累朝为相，不以为耻乎？"冯道答道："乱世之中，百姓流离，吾能为百姓做一点实事，便是积德。至于忠于一姓，那是太平盛世才讲究的事。"',qt:"此时你作为冯道的门生，面对老师的这番话，你的内心想法是：",op:[{l:"A",t:'深以为然！乱世之中，能保全百姓性命、维持社会秩序，便是大功德。忠君之名，虚文尔。',s:{Pragmatism:5,Survival:3,Morality:2,Authority:-2}},{l:"B",t:'心中不以为然，但表面赞同。老师位高权重，得罪不起。',s:{Politics:3,Survival:2,Morality:-1}},{l:"C",t:'认为冯道是为自己开脱。无论乱世盛世，臣子都应忠于君主，这是人臣之节。',s:{Authority:4,Morality:3,Rule:3,Pragmatism:-2}},{l:"D",t:'认为冯道虽务实，但太过圆滑，没有原则。若人人如此，天下更无忠义可言。',s:{Morality:3,Rule:2,Pragmatism:-1}},{l:"E",t:'建议冯道至少为前朝君主守孝三年，再做新朝之官，以全名义。',s:{Rule:3,Morality:2,Pragmatism:-1}}]},{id:27,yr:"CP张力",ti:"李克用与李存勖",sc:"取材：《新五代史·唐本纪》",ct:'李克用临终前，对李存勖说："吾不及见尔之成也。尔当勉之，勿忘吾志。"李存勖跪地痛哭，接过三支箭。后来李存勖每次出征，都将箭请出，凯旋后再送回宗庙。有人问他为何如此，他说："这是先王的嘱托，不敢一刻或忘。"',qt:"你感受到这对父子之间：",op:[{l:"A",t:'是一种沉重的羁绊。父亲把未竟之志强加于儿子，既是动力，也是枷锁。',s:{Authority:3,Chemistry:4,Pragmatism:1}},{l:"B",t:'是一种深深的信任和期待。李克用相信儿子能完成自己做不到的事。',s:{Chemistry:5,Authority:2,Morality:2}},{l:"C",t:'是一种政治表演。李存勖借父亲的遗命来强化自己的合法性。',s:{Politics:4,Chemistry:-2,Pragmatism:2}},{l:"D",t:'被这种"父子相托"的情感打动，想象若有如此父亲或儿子，该当如何。',s:{Chemistry:4,Literature:2,Morality:1}},{l:"E",t:'认为李存勖应该有自己的志向，而不是活在父亲的阴影下。',s:{Rebel:3,Authority:-2,Chemistry:-1}}]},{id:28,yr:"抽象题",ti:"乱世的正义",sc:"",ct:'在一个人命如草芥、强者为尊的乱世——有人以"天补均平"之名起兵，最终却变成自己曾反对的那种人；有人坚守忠义，最终绝食而死；有人背叛旧主、投靠新朝，说是为了保全百姓。',qt:'在这样的乱世里，你认为"正义"是什么：',op:[{l:"A",t:'是强者的工具。谁掌握了权力，谁就能定义正义。',s:{Politics:4,Pragmatism:3,Morality:-2,Rule:-3}},{l:"B",t:'是弱者的幻想。乱世之中，活下去就是最大的正义。',s:{Survival:5,Pragmatism:2,Morality:-1}},{l:"C",t:'是超越时代的永恒价值。即使天下大乱，人也应当守住底线。',s:{Morality:5,Rule:4,Pragmatism:-2}},{l:"D",t:'是多数人的利益。能让最多人活下去的选择，就是正义。',s:{Mobilization:4,Pragmatism:3,Morality:1}},{l:"E",t:'是历史的书写者。胜者为王，败者为寇，后人只会记得胜利者的正义。',s:{Politics:3,Rebel:2,Literature:2}}]},{id:29,yr:"抽象题",ti:"你的选择",sc:"",ct:'五代十国，五十四年间换了五个朝代、十几个皇帝。有人崛起于草莽，有人陨落于宫阙；有人背负千古骂名，有人守住一寸丹心。如果穿越到这个时代，面对同样的困局、同样的诱惑、同样的生死抉择——',qt:"你内心深处最希望成为：",op:[{l:"A",t:'开国之君。即使背负骂名，也要建立自己的王朝，留名青史。',s:{Rebel:4,Politics:4,Military:3,Kill:2}},{l:"B",t:'一代名将。驰骋沙场，建功立业，马革裹尸还。',s:{Military:5,Morality:2,Kill:2}},{l:"C",t:'治世能臣。辅佐明主，平定天下，让百姓过上好日子。',s:{Mobilization:4,Politics:3,Morality:3}},{l:"D",t:'隐世高人。远离纷争，著书立说，保全性命。',s:{Survival:5,Literature:4,Rebel:2}},{l:"E",t:'忠臣义士。无论君主如何，都要守住为人臣子的本分。',s:{Authority:5,Morality:4,Rule:3}}]},{id:30,yr:"978年",ti:"钱弘俶的抉择",sc:"取材：《宋史·吴越钱氏世家》《十国春秋·吴越五》",ct:'太平兴国三年（978年），吴越国主钱弘俶面临生死抉择。宋太宗赵光义灭南唐后，命钱弘俶入朝，实则软禁。群臣建议："吴越兵精粮足，可一战也。"但钱弘俶深知，江南已平，抵抗只会让百姓生灵涂炭。最终，他选择带着户籍账册入朝，主动献土归宋。吴越和平并入北宋。',qt:"你作为钱弘俶的谋臣，面对这个抉择，你会建议：",op:[{l:"A",t:'劝钱弘俶死守！吴越地利人和，未必不能一战。宁为玉碎，不为瓦全！',s:{Rebel:5,Military:4,Morality:2,Pragmatism:-3}},{l:"B",t:'建议接受现实，主动献土归宋。保全百姓生命，才是真正的仁义。',s:{Morality:4,Pragmatism:5,Rebel:-3,Authority:2}},{l:"C",t:'建议先试探宋廷态度，争取保留吴越国号和部分自治权。',s:{Politics:5,Pragmatism:3,Authority:1}},{l:"D",t:'建议率部流亡海外，效仿箕子朝鲜，保留吴越血脉。',s:{Survival:3,Rebel:3,Pragmatism:2,Authority:-2}},{l:"E",t:'建议拖延时间，暗中联络南唐旧部，待天下有变再图恢复。',s:{Politics:4,Rebel:3,Pragmatism:2,Survival:-2}}]}];

function match(u){var H=[{n:"朱温",st:"铁血枭雄",ss:{Kill:95,Military:75,Politics:85,Authority:20,Mobilization:70,Rule:30,Rebel:90,Survival:85,Morality:20,Pragmatism:90,Literature:30,Chemistry:40},ds:'<p>你是五代十国最典型的"现实主义者"——不是不知道仁义道德，而是清楚地知道，在那个人命如草芥的乱世，心软的人活不过三集。</p><p>朱温从黄巢起义军叛逃，加入唐朝官军，一路踩着尸骨爬到天下霸主的地位。他杀过恩人，负过义，也建立过后梁王朝。</p><p><b>朱温最被人诟病的三件事：</b><br>第一，白马驿之祸。他听从李振建议，把三十多位唐朝大臣投进黄河，理由是"此辈自谓清流，宜投之黄河，使为浊流"。一夜之间，唐朝最后的忠臣被屠殆尽。<br>第二，弑君。公元904年，他逼迫唐昭宗迁都，随后派人刺死昭宗，屠戮昭宗九个儿子中最年长的九个。这是中国历史上最恶劣的弑君事件之一。<br>第三，纵容部下。他麾下军纪败坏，所过之处烧杀抢掠，百姓有云"贼过如梳，兵过如篦"。</p><p><b>给你的寄语：</b><br>"你是一个清醒的人，但清醒和良知是两回事。五代十国因为他而开始，也因为他而格外黑暗。"</p>'},{n:"李克用",st:"沙陀雄狮",ss:{Kill:70,Military:95,Politics:40,Authority:50,Mobilization:60,Rule:60,Rebel:70,Survival:75,Morality:50,Pragmatism:60,Literature:35,Chemistry:85},ds:'<p>你是五代十国最能打的人——不是之一，是最能打。李克用的沙陀铁骑，是整个五代初期最可怕的军事力量。他有野心，有能力，有团队，偏偏缺了一点运气。</p><p>李克用的悲剧在于：他永远在打仗，却永远差一点。他恨朱温入骨，却终其一生未能报仇；他扶持唐朝，却眼睁睁看着唐朝灭亡。他留给儿子的不是江山，是三支箭，和一个可能永远无法完成的复仇名单。</p><p><b>给你的寄语：</b><br>"你是一个相信\'天道酬勤\'的人。只要功夫下得深，铁杵也能磨成针。但有时候，方向比努力更重要。五代十国告诉你：最能打的人，不一定是最能赢的人。"</p>'},{n:"杨行密",st:"江左仁主",ss:{Kill:50,Military:70,Politics:75,Authority:60,Mobilization:80,Rule:70,Rebel:40,Survival:90,Morality:65,Pragmatism:70,Literature:50,Chemistry:55},ds:'<p>你是五代十国里难得的"好人"——不是软弱的好，是有底线的、聪明的好。杨行密从一个底层农民做到吴国王，靠的不是杀伐果断，而是审时度势和民心所向。</p><p>他放过孙儒的残部，因为他知道扬州已经够惨了；他允许钱镠修杭州城，因为他懂得顺势而为。在一个人人争相称帝的乱世，杨行密始终没有迈出那一步——不是因为没有实力，而是因为还有所不为。</p><p><b>给你的寄语：</b><br>"你是一个有温度的人。在一个以残酷为通行证的世界里，你的\'仁\'显得有些格格不入。但历史会记得：真正让百姓记住的，是那个让他们活下来的人。"</p>'},{n:"唐昭宗",st:"末世悲歌",ss:{Kill:15,Military:45,Politics:60,Authority:85,Mobilization:50,Rule:85,Rebel:55,Survival:25,Morality:80,Pragmatism:30,Literature:55,Chemistry:50},ds:'<p>你是整个五代十国最令人心痛的角色——一个想把事情做好、却完全没有能力做好的皇帝。唐昭宗不是昏君，他真心想让唐朝重新伟大。他诛杀宦官，整顿朝纲，讨伐藩镇——每一件事都是对的，每一件事都失败了。</p><p>他失败的原因很简单：他以为皇帝靠理想就能当，却不知道在军阀横行的时代，没有枪杆子的皇帝，连自己的命都保不住。最终，他死在自己曾经信任的朱温手里，年仅三十八岁。</p><p><b>给你的寄语：</b><br>"你是一个理想主义者——这在五代十国是最危险的身份。理想是火，但没有实力的理想，是一场注定熄灭的火灾。唐昭宗告诉我们：善良不够，还要有力。"</p>'},{n:"王建",st:"蜀地之王",ss:{Kill:60,Military:65,Politics:70,Authority:50,Mobilization:65,Rule:50,Rebel:60,Survival:85,Morality:45,Pragmatism:75,Literature:40,Chemistry:50},ds:'<p>你是五代十国的"老江湖"——从底层一步步爬上来，见过所有的人心险恶，也学会了所有的人情世故。王建早年是个盐贩子，后来投军，最后割据蜀地建立前蜀。</p><p>他不是一个好人，但在他的治下，蜀地百姓确实过了几十年的安稳日子。他知道什么时候该狠，什么时候该忍，什么时候该装傻。这是乱世里最实用的生存智慧。</p><p><b>给你的寄语：</b><br>"你是一个实用主义者，但不是那种冷血的实用主义。你的实用主义里有一点温度，有一点人情世故。王建告诉我们：在这个吃人的世道里，活下来不是耻辱，是本事。"</p>'},{n:"李存勖",st:"戏台帝王",ss:{Kill:65,Military:95,Politics:30,Authority:40,Mobilization:50,Rule:40,Rebel:70,Survival:40,Morality:50,Pragmatism:40,Literature:80,Chemistry:90},ds:'<p>你是五代十国最耀眼、也最令人唏嘘的人物——一个军事天才，一个戏剧爱好者，一个把父亲遗愿背负一生的悲剧英雄。李存勖三箭复仇的故事，是整个五代最燃的篇章，也是最深的诅咒。</p><p>他完成了父亲的三个遗愿，却在成功后迅速腐化，沉迷戏曲，宠信伶人，最终死于一碗蛋炒饭。他的故事告诉我们：复仇可以是动力，但不该是人生的全部。</p><p><b>给你的寄语：</b><br>"你是一个有羁绊的人。那种羁绊可能是责任，可能是执念，可能是某段放不下的关系。它推动你前进，也可能拖垮你。李存勖的故事没有正确答案，只有选择：你愿意背负羁绊走多远？"</p>'},{n:"石敬瑭",st:"儿皇帝",ss:{Kill:50,Military:60,Politics:70,Authority:30,Mobilization:40,Rule:40,Rebel:50,Survival:80,Morality:30,Pragmatism:95,Literature:45,Chemistry:35},ds:'<p>你是五代十国名声最臭的人——"儿皇帝"、"卖国贼"，这些标签跟了你一千多年。石敬瑭把幽云十六州割给契丹，让中原失去了天然的北方屏障，从此宋朝在军事上始终处于被动。</p><p>但我们必须问一句：如果你是石敬瑭，面对必死的困局，你会怎么做？他选择活下来，代价是千古骂名。这是懦弱，还是另一种勇气？</p><p><b>给你的寄语：</b><br>"你是一个被历史审判过的人。但历史是胜利者写的，你只是做了当时认为最\'理性\'的选择。石敬瑭的悲剧在于：他的选择保全了他的命，却毁了他的身后名。"</p>'},{n:"郭威",st:"黄旗天子",ss:{Kill:60,Military:75,Politics:80,Authority:70,Mobilization:75,Rule:75,Rebel:60,Survival:85,Morality:75,Pragmatism:80,Literature:50,Chemistry:60},ds:'<p>你是五代十国最"正常"的开国皇帝——不是最英明的，但是最像人的那个。郭威从底层小兵做到后周皇帝，靠的是过人的军事能力和政治手腕，也靠的是那份难得的民心。</p><p>他是"黄袍加身"的发明者（虽然赵匡胤抄得更成功）。他的军变是被逼出来的——后汉隐帝杀了他全家，他才起兵复仇。在道德和生存之间，郭威选择了生存，然后尽量让自己不要变成彻底的坏人。</p><p><b>给你的寄语：</b><br>"你是一个被命运推着走的人。不是你选择了时代，而是时代选择了你。郭威教会我们：在被迫做出选择之前，先确保自己有选择的能力。"</p>'},{n:"柴荣",st:"壮志未酬",ss:{Kill:55,Military:85,Politics:75,Authority:80,Mobilization:85,Rule:80,Rebel:50,Survival:60,Morality:80,Pragmatism:85,Literature:55,Chemistry:50},ds:'<p>你是五代十国最被低估的人物——如果不是英年早逝，中国历史的走向可能会完全不同。柴荣接手的是一个破烂摊子，用了五年时间整顿军队，发展经济、整饬吏治，让后周成为五代最强的政权。</p><p>他北伐契丹，一路高歌猛进，却在关键时刻病倒。临终前，他把年仅七岁的儿子和整个帝国，托付给了那个他既信任又防范的人——赵匡胤。</p><p><b>给你的寄语：</b><br>"你是一个相信\'好人有好报\'的人。柴荣的故事告诉我们：这世上最残忍的事，不是好人没有好报，而是你明知道风险，却依然选择相信。"</p>'},{n:"赵匡胤",st:"杯酒江山",ss:{Kill:50,Military:80,Politics:90,Authority:85,Mobilization:90,Rule:85,Rebel:40,Survival:90,Morality:80,Pragmatism:90,Literature:60,Chemistry:75},ds:'<p>你是五代十国最后的赢家——不是最能打的那个，但一定是最会做人的那个。赵匡胤用一杯酒，优雅地拿走了功臣们的兵权，完成了中国历史上最"和平"的改朝换代。</p><p>他是武将出身，却用文治结束了武人乱政的循环。他知道枪杆子的危险，所以他选择了把枪杆子收起来。这不是软弱，是清醒。</p><p><b>给你的寄语：</b><br>"你是那种\'笑到最后\'的人。不是因为你不聪明，而是因为你知道什么时候该收手。赵匡胤的聪明之处在于：他赢了，然后他停住了。"</p>'},{n:"赵光义",st:"烛影疑云",ss:{Kill:45,Military:70,Politics:85,Authority:90,Mobilization:75,Rule:90,Rebel:35,Survival:75,Morality:75,Pragmatism:80,Literature:65,Chemistry:45},ds:'<p>你是五代十国最神秘的人物——不是因为你的能力，而是因为那个夜晚到底发生了什么，至今仍是历史悬案。"烛影斧声"，四个字承载了千年的猜测。</p><p>无论真相如何，赵光义继位后的表现是合格的——他继续统一战争，重视文教，试图证明自己配得上这个皇位。他的问题不是能力，而是得位不正带来的心理阴影。</p><p><b>给你的寄语：</b><br>"你是一个背负着秘密的人。不是你选择了秘密，而是命运把秘密塞进了你的口袋里。赵光义告诉我们：有些东西，一旦背上了，就再也放不下来。"</p>'},{n:"冯道",st:"不倒老臣",ss:{Kill:20,Military:20,Politics:80,Authority:40,Mobilization:50,Rule:60,Rebel:30,Survival:95,Morality:50,Pragmatism:90,Literature:75,Chemistry:40},ds:'<p>你是五代十国最有争议的人物——历仕四朝十君，始终位居宰相。冯道被骂了一千多年的"墙头草"、"没有骨气"，但他同时也是那个时代最致力于减少杀戮、保护百姓的人。</p><p>他说："忠于一姓，那是太平盛世才讲究的事。乱世之中，百姓流离，吾能为百姓做一点实事，便是积德。"这话对不对？见仁见智。</p><p><b>给你的寄语：</b><br>"你是一个不在乎名声的人。这在重视名节的时代，是最大的\'离经叛道\'。冯道的选择需要勇气——不是拔剑而起的勇气，而是承受千年骂名的勇气。"</p>'},{n:"敬翔",st:"谋己之才",ss:{Kill:40,Military:30,Politics:95,Authority:50,Mobilization:40,Rule:70,Rebel:60,Survival:70,Morality:55,Pragmatism:85,Literature:70,Chemistry:65},ds:'<p>你是五代十国最顶尖的谋士之一——朱温的首席智囊，几乎所有重大决策背后都有敬翔的影子。他是那种"我不出手则已，出手必有所中"的人物。</p><p>但敬翔有一个致命的弱点：他对朱温过于忠诚，以至于在朱温死后，拒绝为朱友珪效力，最终自缢身亡。这是谋士的悲哀——主公死了，他的谋略也失去了意义。</p><p><b>给你的寄语：</b><br>"你是那种\'选择比努力更重要\'的典型。敬翔的能力毋庸置疑，但他的选择让他最终成了一场悲剧。谋士的智慧，不只体现在出谋划策上，也体现在选择跟谁上。"</p>'},{n:"王彦章",st:"铁枪不死",ss:{Kill:70,Military:85,Politics:20,Authority:80,Mobilization:40,Rule:70,Rebel:40,Survival:50,Morality:75,Pragmatism:40,Literature:30,Chemistry:80},ds:'<p>你是五代十国的"关二哥"——武艺高强，忠义无双，最后从容赴死。王彦章的故事是整个五代最悲壮的篇章之一：被俘之后，李存勖亲自劝降，许以高官厚禄，他只有一句话："彦章武人，不知降字。"</p><p>一个"不知降字"，道尽了武人的全部骄傲。</p><p><b>给你的寄语：</b><br>"你是一个有骨气的人。在这个\'识时务者为俊杰\'成为主流的时代，你的\'不识时务\'是一种奢侈的勇气。王彦章告诉我们：有些东西，比活着更重要。"</p>'},{n:"李煜",st:"词魂亡国",ss:{Kill:10,Military:5,Politics:25,Authority:35,Mobilization:20,Rule:45,Rebel:25,Survival:35,Morality:55,Pragmatism:20,Literature:95,Chemistry:75},ds:'<p>你是中国历史上最著名的亡国之君，也可能是文学史上最有才华的皇帝之一。李煜的词，温柔、细腻、哀伤，是整个五代文学的最高峰——但词写得再好，也救不了南唐。</p><p>他不是一个好皇帝，甚至不是一个有权力欲的人。他只想在自己的小楼里，写写词，听听曲，和心爱的人在一起。但命运偏偏把他推上了帝位，然后在他毫无准备的时候，把一切夺走。</p><p><b>给你的寄语：</b><br>"你是一个灵魂过于细腻的人。在这个粗粝的、暴力的、只认权力的世界里，你的敏感是一种负担，也是一种天赋。李煜的故事告诉我们：天赋和使命，未必是同一样东西。"</p>'},{n:"黄巢",st:"均平之梦",ss:{Kill:85,Military:60,Politics:40,Authority:10,Mobilization:90,Rule:20,Rebel:95,Survival:30,Morality:15,Pragmatism:50,Literature:85,Chemistry:30},ds:'<p>你是唐末最震撼的存在——一个屡试不第的文人，振臂一呼，写下了"他年我若为青帝，报与桃花一处开"，然后真的拉起了一支队伍，差点推翻了整个唐朝。</p><p>黄巢的意义不只是造反本身，更在于他提出了"均平"的口号——在门阀士族垄断一切的唐朝晚期，"均贫富、等贵贱"这六个字，点燃了无数人的希望。</p><p><b>给你的寄语：</b><br>"你是一个有理想的人，但理想有时候是一把双刃剑。黄巢的悲剧不在于他失败了，而在于他在追求理想的过程中，变成了自己曾经反对的那种人。"</p>'},{n:"郑畋",st:"凤翔忠魂",ss:{Kill:40,Military:50,Politics:60,Authority:95,Mobilization:70,Rule:90,Rebel:20,Survival:40,Morality:90,Pragmatism:50,Literature:70,Chemistry:45},ds:'<p>你是唐朝最后的忠臣之一——凤翔节度使郑畋，在黄巢攻入长安后，第一个站出来起兵勤王。他联络各镇，歃血为盟，硬是在唐朝大厦将倾之时，撑起了一根柱子。</p><p>郑畋的能力和道德都无可挑剔，但唐朝的灭亡不是一个人能挽回的。他的忠义是黑暗中的一束光，但那束光最终没能照亮唐朝的未来。</p><p><b>给你的寄语：</b><br>"你是一个把\'忠义\'两个字刻进骨头里的人。在一个\'识时务者为俊杰\'的时代，郑畋的坚守显得格外悲壮。他告诉我们：有些事情，不是因为有希望才坚持，而是因为坚持才有意义。"</p>'},{n:"高骈",st:"淮南暮云",ss:{Kill:50,Military:70,Politics:60,Authority:70,Mobilization:50,Rule:60,Rebel:30,Survival:30,Morality:50,Pragmatism:60,Literature:80,Chemistry:35},ds:'<p>你是唐代末年最复杂的人物之一——高骈出身名门，武将世家，能带兵打仗，也能写诗填词，是那种"明明可以靠武力，却偏偏要靠才华"的人。</p><p>但高骈的晚年是一个悲剧——他沉迷道教修仙，宠信术士，拒绝出兵救援朝廷，最终被部下囚禁。在他身上，才华和昏聩、清醒和糊涂，奇怪地混合在一起。</p><p><b>给你的寄语：</b><br>"你是一个有才华但容易被诱惑的人。高骈的前半生是英雄，后半生是笑话——这中间的转折点，是他开始相信自己可以超越现实的规则。"</p>'},{n:"孙儒",st:"乱世蝗虫",ss:{Kill:90,Military:65,Politics:30,Authority:30,Mobilization:40,Rule:20,Rebel:70,Survival:20,Morality:10,Pragmatism:40,Literature:20,Chemistry:25},ds:'<p>你是唐末最残暴的军阀之一——孙儒以杀人为乐，纵横江淮之间，所到之处寸草不生。他的军队以"食用人肉"闻名，是中国历史上最黑暗的片段之一。</p><p>孙儒没有任何道德底线，也不假装有。他是一个彻底的"现实主义者"——在这个意义上，他确实是成功的。但成功的代价是什么？是数万人的生命和一个永远不会翻身的历史骂名。</p><p><b>给你的寄语：</b><br>"你是一个把\'活下去\'当成唯一目标的人。孙儒的故事是\'丛林法则\'的极端版本：它告诉我们，当所有人都放下道德的时候，人类可以变成什么。"</p>'},{n:"罗隐",st:"蜂蝶翩翩",ss:{Kill:30,Military:20,Politics:60,Authority:40,Mobilization:30,Rule:70,Rebel:50,Survival:60,Morality:75,Pragmatism:50,Literature:95,Chemistry:50},ds:'<p>你是唐末最毒舌的诗人——罗隐的诗，骂人不带脏字，讽刺直入骨髓。"今朝有酒今朝醉"、"任汝纷纷营不休，尘埃还有飞扬意"——他的才华和愤世嫉俗一样出名。</p><p>但罗隐的另一面是深沉的温柔。他写过"西施家在西子国，馆娃宫边思无极"，也写过无数同情百姓疾苦的作品。他的毒舌背后，是一颗被科举伤害过、被世道辜负过、却依然没有彻底麻木的心。</p><p><b>给你的寄语：</b><br>"你是一个嘴硬心软的人。罗隐用讽刺把自己包裹起来，但包裹之下的，是一个依然相信公平、相信正义的灵魂。只是他选择了用毒舌来保护自己。"</p>'},{n:"皮日休",st:"笔刀文人",ss:{Kill:35,Military:25,Politics:50,Authority:60,Mobilization:40,Rule:65,Rebel:60,Survival:50,Morality:70,Pragmatism:45,Literature:90,Chemistry:55},ds:'<p>你是唐代最后一批有骨气的文人之一——皮日休参加过黄巢的起义军，是少数用行动实践自己理想的文人。他写过《忧赋》、《河间歌诗》，文风犀利，直指社会黑暗。</p><p>关于皮日休的结局，历史上说法不一——有说他被黄巢所杀，有说他后来隐居山林。但无论如何，他是一个把自己的人生押在了理想上的人，不管押注的结果如何。</p><p><b>给你的寄语：</b><br>"你是一个愿意为理想付出行动的人。皮日休不只是写文章批判现实，他真的拿起了武器——虽然这把武器最终没有改变什么，但他的勇气已经超越了大多数只会空谈的文人。"</p>'},{n:"李振",st:"浊流清士",ss:{Kill:60,Military:40,Politics:85,Authority:40,Mobilization:50,Rule:50,Rebel:70,Survival:65,Morality:35,Pragmatism:80,Literature:65,Chemistry:50},ds:'<p>你是五代十国最典型的"反派谋士"——李振为朱温出谋划策，亲手参与了白马驿之祸，屠杀唐朝忠臣三十余人。那句"此辈自谓清流，宜投之黄河，使为浊流"，就是他的手笔。</p><p>但李振又不是纯粹的坏人。他有自己的政治抱负，有对朱温的忠诚（虽然这种忠诚建立在利益之上），也有自己的才能。他的悲剧在于，他把才华用在了错误的方向上。</p><p><b>给你的寄语：</b><br>"你是一个\'精致的利己主义者\'——有能力，有手段，有头脑，唯一缺少的是一个值得为之付出的理想。李振的故事告诉我们：没有方向的聪明，比愚蠢更危险。"</p>'},{n:"张承业",st:"忠宦遗恨",ss:{Kill:30,Military:40,Politics:70,Authority:90,Mobilization:60,Rule:85,Rebel:20,Survival:70,Morality:85,Pragmatism:60,Literature:50,Chemistry:85},ds:'<p>你是五代十国最令人泪目的忠臣——张承业是宦官，却比大多数士大夫更有骨气。他受李克用遗命，誓死效忠唐朝，看着李存勖一步步走向称帝，却始终不肯背叛自己的诺言。</p><p>当李存勖宣布称帝的那一刻，张承业知道自己的信仰崩塌了。他选择了最激烈的方式——绝食而死——来守住一个他明知已经不可能守住的理想。</p><p><b>给你的寄语：</b><br>"你是一个把承诺看得比命重的人。张承业的忠义，在今天可能会被嘲笑为\'愚忠\'，但那种愿意为信念赴死的勇气，是任何一个时代都稀缺的品质。"</p>'},{n:"钱弘俶",st:"吴越归宋",ss:{Kill:25,Military:45,Politics:70,Authority:55,Mobilization:60,Rule:75,Rebel:15,Survival:85,Morality:75,Pragmatism:85,Literature:55,Chemistry:45},ds:'<p>你是五代十国最"识时务"的国主——钱弘俶在宋太宗灭南唐后，选择主动献土归宋。吴越国和平并入北宋，江南百姓免于战火，钱氏家族也在宋朝得到了极高的礼遇。</p><p>钱弘俶的选择和石敬瑭有相似之处——都是为了保全自己/家族/百姓，选择了屈服于更强大的力量。但不同的是，钱弘俶的屈服换来的是和平，而石敬瑭的屈服换来的是长久的骂名。</p><p><b>给你的寄语：</b><br>"你是一个懂得\'放下\'的人。\'宁为玉碎，不为瓦全\'是勇气，但\'审时度势，以民为本\'需要另一种勇气。钱弘俶告诉你：有时候，活着比死去更需要勇气。"</p>'},{n:"普通士人",st:"乱世浮沉",ss:{Kill:30,Military:30,Politics:40,Authority:60,Mobilization:40,Rule:60,Rebel:40,Survival:60,Morality:60,Pragmatism:50,Literature:50,Chemistry:50},ds:'<p>你是五代十国最"普通"的大多数——不是朱温那样的枭雄，不是黄巢那样的叛逆，也不是李煜那样的词人。你是无数在乱世中挣扎求存的普通读书人。</p><p>你有才华，但科举是一场不公平的游戏；你有理想，但乱世不给你实现的机会；你想忠于某个政权，但那个政权三年就换了一个名字。你能做的，只是随波逐流，尽量不失本心，在夹缝中活下来。</p><p><b>给你的寄语：</b><br>"你是一个普通人——但\'普通\'在这个时代，本身就是一种不普通。五代十国的历史里，普通人的声音很少被记录，但正是这些沉默的大多数，构成了历史最真实的底色。"</p>'}];
